name: Lean Call Graph

on:
  # Triggered after lean.yml completes (provides atoms.json artifact)
  workflow_run:
    workflows: ["Lean Verification"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: callgraph
  cancel-in-progress: true

jobs:
  prepare-atoms:
    name: Download atoms from lean.yml
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download probe artifacts from lean.yml
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: probe-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch atoms.json from cache (workflow_dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/cache/restore@v4
        with:
          path: |
            functions.json
            atoms.json
          key: probe-outputs-never-match
          restore-keys: probe-outputs-

      - name: Upload atoms for reusable workflow
        uses: actions/upload-artifact@v4
        with:
          name: pre-built-atoms
          path: atoms.json
          retention-days: 1
          if-no-files-found: error

  generate:
    needs: prepare-atoms
    uses: Beneficial-AI-Foundation/scip-callgraph/.github/workflows/generate-lean-callgraph.yml@main
    with:
      deploy_mode: subpath
      subpath: callgraph
      github_branch: master
      pre_built_atoms: pre-built-atoms

  cache-callgraph:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Download callgraph artifact
        uses: actions/download-artifact@v4
        with:
          name: callgraph-viewer
          path: callgraph

      - name: Fix asset paths for subpath deployment
        run: |
          sed -i 's|"/callgraph/|"/curve25519-dalek-lean-verify/callgraph/|g' callgraph/index.html
          sed -i 's|href="/assets/|href="/curve25519-dalek-lean-verify/callgraph/assets/|g' callgraph/index.html
          sed -i 's|src="/assets/|src="/curve25519-dalek-lean-verify/callgraph/assets/|g' callgraph/index.html
          echo "Fixed asset paths for /curve25519-dalek-lean-verify/callgraph/"

      - name: Save callgraph to cache
        uses: actions/cache/save@v4
        with:
          path: callgraph
          key: callgraph-${{ github.sha }}-${{ github.run_id }}
