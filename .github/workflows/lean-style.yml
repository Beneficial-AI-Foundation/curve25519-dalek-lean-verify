name: Lean Style Lint

# Checks Lean files against the project style guide (style.md).
# Context-free rules are enforced on every push/PR.
# Context-sensitive (LLM) rules run only when ANTHROPIC_API_KEY is available
# (set as a repository secret to enable in CI).

on:
  push:
    branches: ['**']
    paths:
      - 'Curve25519Dalek/**'
      - 'Utils/**'
      - 'scripts/lean_style_linter.py'
      - 'style.md'
      - '.github/workflows/lean-style.yml'
  pull_request:
    branches: ['**']
  workflow_dispatch:
    inputs:
      agent:
        description: 'Run LLM-based context-sensitive checks'
        required: false
        default: 'false'
        type: boolean

jobs:
  lint:
    name: Style Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install anthropic only if the secret is available (for agent checks)
      - name: Install dependencies
        run: |
          pip install anthropic || true

      - name: Run context-free style checks (Specs)
        run: |
          python3 scripts/lean_style_linter.py \
            --all \
            --root Curve25519Dalek/Specs \
            --format github \
            --errors-only

      - name: Run context-free style checks (Utils/other)
        # Warnings only — infrastructure files have known long lines
        continue-on-error: true
        run: |
          python3 scripts/lean_style_linter.py \
            --all \
            --root Curve25519Dalek \
            --exclude .lake,Specs \
            --format github \
            --ignore R007,R008,R009,R010,R011,R012,R014,R015,R016,R017 \
            --errors-only

      - name: Run LLM-based context-sensitive checks
        if: >-
          secrets.ANTHROPIC_API_KEY != '' &&
          (github.event_name == 'workflow_dispatch' && inputs.agent == 'true')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/lean_style_linter.py \
            --all \
            --root Curve25519Dalek/Specs \
            --agent \
            --rules A001,A002,A003 \
            --format github
