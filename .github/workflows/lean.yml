name: Lean Verification

# This workflow builds and checks the Lean verification project.
# It ensures that all proofs compile and that the formal verification remains valid.

on:
  push:
    branches: [ '**' ]
    paths:
      - 'Curve25519Dalek/**'
      - 'Utils/**'
      - 'lakefile.toml'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [ '**' ]
    # paths:
    #   - 'Curve25519Dalek/**'
    #   - 'Utils/**'
    #   - 'lakefile.toml'
    #   - 'lean-toolchain'
    #   - '.github/workflows/lean.yml'
  workflow_dispatch:

env:
  LEAN_ABORT_ON_PANIC: 1

jobs:
  build:
    name: Build Lean Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Verify elan installation
        run: |
          elan --version
          lean --version

      - name: Cache Lean build
        uses: actions/cache@v4
        with:
          path: |
            .lake
            build
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.toml') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('Curve25519Dalek/**/*.lean', 'Utils/**/*.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.toml') }}-${{ hashFiles('lake-manifest.json') }}-
            ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-
            ${{ runner.os }}-lean-

      - name: Download dependency caches
        run: lake exe cache get

      - name: Build Lean project
        run: lake build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache probe-aeneas binary
        id: cache-probe-aeneas
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/probe-aeneas
          key: probe-aeneas-${{ runner.os }}-${{ hashFiles('.github/workflows/lean.yml') }}

      - name: Install probe-aeneas
        if: steps.cache-probe-aeneas.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/Beneficial-AI-Foundation/probe-aeneas

      - name: Cache probe-lean binary
        id: cache-probe-lean
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/probe-lean
          key: probe-lean-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('.github/workflows/lean.yml') }}

      - name: Install probe-lean
        if: steps.cache-probe-lean.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/Beneficial-AI-Foundation/probe-lean.git /tmp/probe-lean
          cd /tmp/probe-lean && lake build
          mkdir -p ~/.local/bin
          cp .lake/build/bin/probe-lean ~/.local/bin/

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Generate functions.json
        run: |
          probe-aeneas listfuns --lean-project . -o functions.json
          probe-lean extract . -l Curve25519Dalek -m Curve25519Dalek -o lean_atoms.json
          python3 scripts/enrich_functions.py \
            --functions functions.json \
            --atoms lean_atoms.json \
            --output functions.json

      - name: Upload functions.json
        uses: actions/upload-artifact@v4
        with:
          name: functions-json
          path: functions.json
          retention-days: 30

      - name: Verify build success
        run: |
          echo "✓ Build successful!"
