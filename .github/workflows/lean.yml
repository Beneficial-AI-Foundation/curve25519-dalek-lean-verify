name: Lean Verification

# Single build+extract workflow. Downstream workflows (deploy-docs, callgraph)
# consume the artifacts produced here via workflow_run triggers.

on:
  push:
    branches: [ '**' ]
    paths:
      - 'Curve25519Dalek/**'
      - 'Utils/**'
      - 'lakefile.toml'
      - 'lean-toolchain'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

env:
  LEAN_ABORT_ON_PANIC: 1

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  build:
    name: Build Lean Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Verify elan installation
        run: |
          elan --version
          lean --version

      - name: Cache Lean build
        uses: actions/cache@v4
        with:
          path: |
            .lake
            build
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.toml') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('Curve25519Dalek/**/*.lean', 'Utils/**/*.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.toml') }}-${{ hashFiles('lake-manifest.json') }}-
            ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-
            ${{ runner.os }}-lean-

      - name: Download dependency caches
        run: lake exe cache get

      - name: Build Lean project
        run: lake build

      - name: Install probe-aeneas
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          gh release download --repo Beneficial-AI-Foundation/probe-aeneas \
            --pattern 'probe-aeneas-x86_64-unknown-linux-gnu.tar.xz' --clobber
          tar xJf probe-aeneas-x86_64-unknown-linux-gnu.tar.xz
          cp probe-aeneas-*/probe-aeneas ~/.local/bin/
          rm -rf probe-aeneas-x86_64-unknown-linux-gnu.tar.xz probe-aeneas-*/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate functions.json
        run: probe-aeneas listfuns --lean-project . -o functions.json

      - name: Generate atoms.json for callgraph
        run: probe-lean extract -o atoms.json .

      - name: Upload probe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: probe-artifacts
          path: |
            atoms.json
            functions.json
          retention-days: 30

      - name: Verify build success
        run: |
          echo "✓ Build successful!"
          echo "  atoms.json: $(wc -c < atoms.json) bytes"
          echo "  functions.json: $(wc -c < functions.json) bytes"

      - name: Download baseline functions.json
        id: baseline
        if: github.event_name == 'pull_request'
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          RUN_ID=$(gh run list --workflow lean.yml --branch "$BASE_REF" \
            --status success --limit 1 --json databaseId -q '.[0].databaseId' 2>/dev/null || true)
          if [ -n "$RUN_ID" ]; then
            gh run download "$RUN_ID" --name probe-artifacts --dir /tmp/baseline && \
              echo "found=true" >> "$GITHUB_OUTPUT" && \
              echo "Downloaded baseline from $BASE_REF (run $RUN_ID)" || \
              echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "No successful lean.yml run found on $BASE_REF"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Post PR status diff comment
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ steps.baseline.outputs.found }}" = "true" ]; then
            python3 scripts/diff_functions.py \
              --old /tmp/baseline/functions.json \
              --new functions.json > /tmp/diff.md
          else
            cat > /tmp/diff.md <<'FALLBACK'
          ## Verification Status Diff

          No baseline available for comparison (first run on base branch).
          FALLBACK
          fi
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/diff.md --edit-last 2>/dev/null || \
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/diff.md
        env:
          GH_TOKEN: ${{ github.token }}
