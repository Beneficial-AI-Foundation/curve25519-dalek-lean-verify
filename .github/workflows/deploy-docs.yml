name: Deploy VitePress site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: [master]

  # Check build on pull requests
  pull_request:

  # Run when issues are created, edited, or updated
  issues:
    types: [opened, edited, deleted, closed, reopened, labeled, unlabeled]

  # Run when pull requests are opened or edited
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Rust Nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2025-07-20

      - name: Install dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache probe-aeneas binary
        id: cache-probe-aeneas
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/probe-aeneas
          key: probe-aeneas-${{ runner.os }}-${{ hashFiles('.github/workflows/deploy-docs.yml') }}

      - name: Install probe-aeneas
        if: steps.cache-probe-aeneas.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/Beneficial-AI-Foundation/probe-aeneas

      - name: Install elan (Lean version manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean build
        uses: actions/cache/restore@v4
        with:
          path: |
            .lake
            build
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.toml') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('Curve25519Dalek/**/*.lean', 'Utils/**/*.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.toml') }}-${{ hashFiles('lake-manifest.json') }}-
            ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}-
            ${{ runner.os }}-lean-

      - name: Download dependency caches
        run: lake exe cache get

      - name: Build Lean project
        run: lake build

      - name: Generate functions.json via probe-aeneas
        run: |
          probe-aeneas listfuns --lean-project . --lake -o functions.json
          probe-aeneas extract --lean-project . --lake
          python3 scripts/enrich_functions.py \
            --functions functions.json \
            --atoms .verilib/probes/aeneas_*.json \
            --output functions.json

      - name: Update stats history
        run: |
          python3 scripts/update_stats_history.py \
            --functions-json functions.json \
            --fetch-url https://beneficial-ai-foundation.github.io/curve25519-dalek-lean-verify/outputs/stats_history.jsonl \
            --fill-missing \
            --since 2025-01-01 \
            --max-commits 5000

      - name: Build Rust docs
        run: npm run docs:rust

      - name: Build with VitePress
        run: npm run docs:build

      - name: Restore callgraph from cache
        id: cache-callgraph
        uses: actions/cache/restore@v4
        with:
          path: callgraph
          key: callgraph-nevermatch
          restore-keys: callgraph-

      - name: Copy callgraph to site
        run: |
          if [ -f callgraph/index.html ]; then
            mkdir -p site/.vitepress/dist/callgraph
            cp -r callgraph/* site/.vitepress/dist/callgraph/
            echo "✓ Callgraph added to site/callgraph/"
          else
            echo "No callgraph cache found — deploying without callgraph"
          fi

      - name: Copy outputs to site
        run: |
          if [ -f outputs/stats_history.jsonl ]; then
            mkdir -p site/.vitepress/dist/outputs
            cp outputs/stats_history.jsonl site/.vitepress/dist/outputs/
            echo "✓ stats_history.jsonl added to site/outputs/"
          else
            echo "No stats_history.jsonl found"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.vitepress/dist

  # Deployment job
  deploy:
    # Deploy on push to master, when issues are updated, or when PRs are updated
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'issues' || github.event_name == 'pull_request_target' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
