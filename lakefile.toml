name = "Curve25519Dalek"
version = "0.1.0"
keywords = ["formal verification"]
defaultTargets = ["Curve25519Dalek"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
linter.mathlibStandardSet = true
maxSynthPendingDepth = 3
maxRecDepth = 10000

[[require]]
name = "aeneas"
git = "https://github.com/AeneasVerif/aeneas.git"
subDir = "backends/lean"
rev = "1b39931d"

[[require]]
name = "PrimeCert"
git = "https://github.com/b-mehta/PrimeCert.git"
rev = "15fd61770c9a893af0f5cb7893ea98b7d0bf8d52"

[[lean_lib]]
name = "Curve25519Dalek"

# Standalone library holding the project-linter `#guard_msgs` tests.  Kept separate from
# `Curve25519Dalek` so the dummy `@[step]` test theorems never become public declarations
# of the production library (nor leak into Aeneas's global `@[step]` database via it).
# It is a default target so `lake build` still compiles and checks the tests.
[[lean_lib]]
name = "LinterTest"

[[lean_lib]]
name = "Utils"

# Property-based (Plausible) tests. Deliberately NOT in `defaultTargets`, so the
# randomized `#eval Testable.check` calls do not run on a normal `lake build`.
# Run them explicitly with `lake build Tests`. `globs` builds every `Tests.*`
# submodule directly (no aggregator root module needed).
[[lean_lib]]
name = "Tests"
globs = ["Tests.+"]

[[lean_exe]]
name = "listfuns"
root = "Utils.ListFuns"
supportInterpreter = true

[[lean_exe]]
name = "syncstatus"
root = "Utils.SyncStatus"
supportInterpreter = true
